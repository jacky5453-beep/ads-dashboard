<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>廣告成效數據儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
:root {
  --bg:#080b12; --surface:#0e1420; --surface2:#141c2e; --surface3:#1a2438;
  --border:#1e2d47; --border2:#243452;
  --green:#00e5a0; --blue:#3b82f6; --cyan:#22d3ee;
  --yellow:#fbbf24; --red:#f87171; --purple:#a78bfa;
  --text:#e2e8f0; --text2:#94a3b8; --text3:#475569;
  --sidebar:220px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;display:flex;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* SIDEBAR */
#sidebar{width:var(--sidebar);min-width:var(--sidebar);height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-header{padding:20px 16px 16px;border-bottom:1px solid var(--border);}
.brand{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.brand-dot{width:8px;height:8px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.brand-name{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;letter-spacing:1.5px;color:var(--green);}
.sidebar-subtitle{font-size:10px;color:var(--text3);letter-spacing:1px;}
.year-group{margin-bottom:2px;}
.year-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px;padding:8px 16px 4px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.year-label:hover{color:var(--text2);}
.month-btn{display:flex;align-items:center;justify-content:space-between;padding:7px 16px 7px 24px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .15s;border-left:2px solid transparent;background:none;border-right:none;border-top:none;border-bottom:none;width:100%;text-align:left;font-family:'Noto Sans TC',sans-serif;}
.month-btn:hover{background:var(--surface2);color:var(--text);}
.month-btn.active{background:rgba(0,229,160,.08);border-left-color:var(--green);color:var(--green);}
.month-btn .rev-mini{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);}
.month-btn.active .rev-mini{color:rgba(0,229,160,.6);}
.sidebar-scroll{flex:1;overflow-y:auto;padding-bottom:16px;}

/* MAIN */
#main{flex:1;height:100vh;overflow-y:auto;display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(8,11,18,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:16px;}
.topbar-title{font-size:18px;font-weight:700;flex:1;}
.topbar-meta{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.view-tabs{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px;}
.view-tab{padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--text2);background:none;border:none;font-family:'Noto Sans TC',sans-serif;transition:all .15s;}
.view-tab.active{background:var(--surface3);color:var(--text);}

/* CONTENT */
.content{padding:24px 28px;flex:1;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;transition:border-color .2s;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--kpi-color,var(--green));opacity:.7;}
.kpi-card:hover{border-color:var(--border2);}
.kpi-label{font-size:11px;color:var(--text2);margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.kpi-value{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;line-height:1;margin-bottom:6px;}
.kpi-sub{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.badge{display:inline-flex;align-items:center;gap:2px;font-size:11px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:20px;}
.badge.up{background:rgba(0,229,160,.12);color:var(--green);}
.badge.dn{background:rgba(248,113,113,.12);color:var(--red);}
.badge.na{background:var(--surface2);color:var(--text3);}

/* CHARTS */
.charts-2col{display:grid;grid-template-columns:3fr 2fr;gap:14px;margin-bottom:14px;}
.charts-2eq{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;}
.chart-full{margin-bottom:14px;}
.chart-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.chart-title{font-size:13px;font-weight:600;}
.chart-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.legend{display:flex;gap:12px;font-size:11px;color:var(--text2);}
.leg{display:flex;align-items:center;gap:5px;}
.dot{width:8px;height:8px;border-radius:50%;}
.chart-canvas-wrap{position:relative;}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
thead th{background:var(--surface2);padding:10px 12px;text-align:right;font-weight:600;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap;}
thead th:first-child{text-align:center;}
tbody tr{border-bottom:1px solid rgba(30,45,71,.5);transition:background .1s;}
tbody tr:hover{background:var(--surface2);}
tbody tr:last-child{border-bottom:none;}
tbody td{padding:9px 12px;text-align:right;font-family:'JetBrains Mono',monospace;white-space:nowrap;}
tbody td:first-child{text-align:center;font-weight:700;color:var(--cyan);width:44px;}
.null{color:var(--text3);}
.pos{color:var(--green);}
.neg{color:var(--red);}
.rev-cell{display:flex;align-items:center;gap:8px;justify-content:flex-end;}
.rev-bar{height:3px;border-radius:2px;background:var(--green);opacity:.55;min-width:2px;}

/* SECTION */
.section-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';width:3px;height:12px;background:var(--green);border-radius:2px;}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:var(--text3);gap:10px;font-size:13px;}
.empty-icon{font-size:36px;}

/* SUMMARY STRIP */
.summary-strip{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:4px;}
.sum-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;white-space:nowrap;flex-shrink:0;}
.sum-label{font-size:10px;color:var(--text3);margin-bottom:4px;}
.sum-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--text);}

/* FINANCE TABLE */
.finance-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.finance-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;}
.finance-section-title{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.finance-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(30,45,71,.3);}
.finance-row:last-child{border-bottom:none;}
.finance-label{font-size:11px;color:var(--text2);flex:1;}
.finance-value{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--text);}
.finance-value.green{color:var(--green);}
.finance-value.red{color:var(--red);}
.finance-value.yellow{color:var(--yellow);}
.finance-value.cyan{color:var(--cyan);}
.finance-total-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0 4px;border-top:1px solid var(--border2);margin-top:4px;}
.finance-total-label{font-size:12px;font-weight:700;color:var(--text);}
.finance-total-value{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;}
.input-cell{background:var(--surface3);border:1px solid var(--border2);border-radius:6px;padding:3px 8px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);width:100px;text-align:right;}
.input-cell:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 2px rgba(0,229,160,.15);}
.kpi-grid-top{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
.kpi-grid-small{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px;}

/* NL INPUT PANEL */
.nl-bar{position:fixed;bottom:24px;right:28px;z-index:200;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
.nl-toggle{width:48px;height:48px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px rgba(0,229,160,.4);transition:all .2s;}
.nl-toggle:hover{transform:scale(1.08);box-shadow:0 0 28px rgba(0,229,160,.6);}
.nl-panel{background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:380px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.6);animation:slideUp .2s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.nl-panel-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.nl-panel-title{font-size:13px;font-weight:700;color:var(--green);display:flex;align-items:center;gap:6px;}
.nl-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px;}
.nl-close:hover{color:var(--text);background:var(--surface2);}
.nl-input-wrap{padding:14px 16px;border-bottom:1px solid var(--border);}
.nl-textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;font-family:'Noto Sans TC',sans-serif;resize:none;line-height:1.5;transition:border-color .15s;}
.nl-textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 2px rgba(0,229,160,.12);}
.nl-textarea::placeholder{color:var(--text3);}
td[data-edit]:hover,td[data-editex]:hover{background:rgba(0,229,160,.08);outline:1px dashed var(--green);}
.nl-hint{position:relative;}
.nl-hint-del{display:none;position:absolute;top:-5px;right:-5px;width:14px;height:14px;border-radius:50%;background:var(--red,#ff4d6a);color:#fff;font-size:9px;line-height:14px;text-align:center;cursor:pointer;font-weight:700;}
.nl-hint:hover .nl-hint-del{display:block;}
.nl-hint-add{background:none;border:1px dashed var(--border2);color:var(--text3);cursor:pointer;border-radius:20px;padding:3px 10px;font-size:11px;transition:all .12s;}
.nl-hint-add:hover{border-color:var(--green);color:var(--green);}
.nl-hints{padding:0 16px 10px;display:flex;flex-wrap:wrap;gap:6px;}
.nl-hint{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2);cursor:pointer;transition:all .12s;}
.nl-hint:hover{border-color:var(--green);color:var(--green);}
.nl-actions{padding:12px 16px;display:flex;gap:8px;}
.nl-btn{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif;}
.nl-btn-parse{background:var(--green);color:#080b12;border:none;}
.nl-btn-parse:hover{opacity:.88;}
.nl-btn-parse:disabled{opacity:.4;cursor:not-allowed;}
.nl-btn-clear{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.nl-btn-clear:hover{border-color:var(--border2);color:var(--text);}
/* Preview panel */
.nl-preview{padding:14px 16px;border-top:1px solid var(--border);}
.nl-preview-title{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-bottom:10px;}
.nl-preview-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(30,45,71,.3);}
.nl-preview-row:last-child{border-bottom:none;}
.nl-preview-field{font-size:12px;color:var(--text2);}
.nl-preview-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--cyan);}
.nl-confirm-btn{width:100%;margin-top:12px;padding:10px;border-radius:8px;background:var(--blue);color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s;}
.nl-confirm-btn:hover{opacity:.85;}
.nl-status{font-size:11px;color:var(--text3);margin-top:8px;text-align:center;min-height:16px;}
.nl-loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;color:var(--text2);font-size:12px;}
.nl-spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Column Manager Modal */
.col-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;}
.col-modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:420px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.7);}
.col-modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.col-modal-title{font-size:14px;font-weight:700;color:var(--green);}
.col-modal-body{padding:12px 16px;overflow-y:auto;flex:1;}
.col-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(30,45,71,.3);}
.col-row:last-child{border-bottom:none;}
.col-check{width:16px;height:16px;accent-color:var(--green);cursor:pointer;}
.col-name{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-size:12px;}
.col-name:focus{outline:none;border-color:var(--green);}
.col-del{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--text3);cursor:pointer;font-size:11px;}
.col-del:hover{border-color:#ff4d6a;color:#ff4d6a;}
.col-fixed-badge{font-size:9px;color:var(--text3);background:var(--surface2);padding:2px 5px;border-radius:4px;white-space:nowrap;}
.col-modal-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;}
.col-add-btn{flex:1;padding:8px;border-radius:8px;background:var(--surface2);border:1px dashed var(--border2);color:var(--text2);cursor:pointer;font-size:12px;}
.col-add-btn:hover{border-color:var(--green);color:var(--green);}
.col-save-btn{padding:8px 20px;border-radius:8px;background:var(--green);border:none;color:#080b12;font-size:13px;font-weight:700;cursor:pointer;}

/* Year view */
.year-section{margin-bottom:28px;}
.year-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.year-kpi{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;}
.year-kpi-label{font-size:10px;font-weight:700;letter-spacing:1.2px;color:var(--text3);text-transform:uppercase;margin-bottom:6px;}
.year-kpi-val{font-size:22px;font-weight:800;letter-spacing:-.5px;}
.year-kpi-sub{font-size:11px;color:var(--text3);margin-top:3px;}
.year-month-table{width:100%;border-collapse:collapse;font-size:12px;}
.year-month-table th{text-align:left;padding:8px 10px;color:var(--text3);font-weight:600;font-size:10px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border2);white-space:nowrap;}
.year-month-table td{padding:8px 10px;border-bottom:1px solid rgba(30,45,71,.3);white-space:nowrap;}
.year-month-table tr:hover td{background:rgba(255,255,255,.02);}
.year-month-table tfoot td{font-weight:700;border-top:2px solid var(--border2);background:var(--surface2);}
.year-month-name{font-weight:600;cursor:pointer;color:var(--text2);}
.year-month-name:hover{color:var(--green);}
.year-chart-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;}
.year-chart-box{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:16px;height:220px;display:flex;flex-direction:column;}
.year-chart-box canvas{flex:1;min-height:0;}
.year-chart-title{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:8px;flex-shrink:0;}

/* ═══════════════════════════════
   MOBILE RESPONSIVE STYLES
   ═══════════════════════════════ */
@media (max-width: 768px) {

  /* ── Layout ── */
  body { overflow-x: hidden; }

  #sidebar {
    position: fixed;
    left: 0; bottom: 0; top: auto;
    width: 100%;
    height: auto;
    max-height: 60vh;
    border-right: none;
    border-top: 1px solid var(--border2);
    z-index: 300;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform .3s ease;
    border-radius: 16px 16px 0 0;
  }
  #sidebar.mobile-open {
    transform: translateY(0);
  }
  #sidebar .sidebar-header { padding: 12px 16px 8px; }
  #sidebar .sidebar-scroll { max-height: 45vh; overflow-y: auto; padding-bottom: 16px; }

  #main {
    margin-left: 0;
    padding-bottom: 70px;
  }

  /* ── Top bar ── */
  .topbar {
    padding: 10px 14px;
    gap: 8px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 200;
    background: var(--bg);
  }
  .topbar-title { font-size: 16px; }
  .topbar-meta  { font-size: 10px; }
  .view-tabs { gap: 4px; }
  .view-tab  { padding: 5px 10px; font-size: 11px; }

  /* ── Mobile menu button ── */
  #mobileMenuBtn {
    display: flex !important;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    margin-left: auto;
  }

  /* ── Mobile sidebar overlay ── */
  #sidebarOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 299;
  }
  #sidebarOverlay.active { display: block; }

  /* ── KPI cards ── */
  .kpi-grid-top   { grid-template-columns: repeat(2, 1fr) !important; gap: 8px; }
  .kpi-grid-small { grid-template-columns: repeat(2, 1fr) !important; gap: 8px; }
  .kpi-card { padding: 12px 14px; }
  .kpi-val  { font-size: 20px; }
  .kpi-label{ font-size: 9px; }

  /* ── Charts ── */
  .charts-2col, .charts-2eq, .charts-3col {
    grid-template-columns: 1fr !important;
    gap: 12px;
  }
  .chart-card { padding: 12px; }
  .chart-title { font-size: 12px; }

  /* ── Finance grid ── */
  .finance-grid { grid-template-columns: 1fr !important; gap: 12px; }
  .finance-section { padding: 14px; }

  /* ── Section title ── */
  .section-title { font-size: 11px; padding: 10px 0 8px; }

  /* ── Table ── */
  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 0 -14px;
    padding: 0 14px;
  }
  table { min-width: 700px; font-size: 11px; }
  th, td { padding: 6px 8px; white-space: nowrap; }

  /* ── Summary strip ── */
  .summary-strip {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 8px;
    margin-bottom: 12px;
  }
  .sum-item { padding: 8px 10px; }
  .sum-val  { font-size: 13px; }

  /* ── Year KPI grid ── */
  .year-kpi-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 8px; }
  .year-kpi { padding: 12px 14px; }
  .year-kpi-val { font-size: 18px; }
  .year-chart-wrap { grid-template-columns: 1fr !important; }
  .year-month-table { font-size: 11px; }

  /* ── NL Panel ── */
  .nl-bar { bottom: 16px; right: 16px; }
  .nl-panel {
    width: calc(100vw - 32px) !important;
    max-height: 80vh;
    overflow-y: auto;
  }

let cur = null, view = 'dash';
let charts = {};

const MZ = ['','一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

// ── HELPERS ──
const fmt = {
  money: v => v==null?'—': v>=1e6?(v/1e6).toFixed(2)+'M': v>=1e3?(v/1e3).toFixed(1)+'K': Math.round(v).toLocaleString(),
  full:  v => v==null?'—':'NT$ '+Math.round(v).toLocaleString(),
  num:   v => v==null?'—': Math.round(v).toLocaleString(),
  pct:   v => v==null?'—': (v*100).toFixed(2)+'%',
  dec2:  v => v==null?'—': (+v).toFixed(2),
};

function badge(cur, prev, inverse=false) {
  if (!cur||!prev||prev===0) return '<span class="badge na">—</span>';
  const p = (cur-prev)/prev*100;
  const up = inverse ? p<0 : p>0;
  return `<span class="badge ${up?'up':'dn'}">${p>0?'▲':'▼'} ${Math.abs(p).toFixed(1)}%</span>`;
}

function prevKey(k) {
  const [y,m] = k.split('.').map(Number);
  return m===1 ? `${y-1}.12` : `${y}.${String(m-1).padStart(2,'0')}`;
}

// ── SIDEBAR ──
function buildSidebar() {
  const years = {};
  Object.keys(DATA).sort().forEach(k => {
    const [y,m] = k.split('.');
    (years[y]=years[y]||[]).push({k,m:parseInt(m)});
  });
  let html = '';
  Object.entries(years).sort((a,b)=>b[0]-a[0]).forEach(([yr,months]) => {
    html += `<div class="year-group">
      <div class="year-label" onclick="toggleYr('${yr}')"><span>${yr}</span><span>▾</span></div>
      <div id="yr-${yr}">`;
    months.sort((a,b)=>b.m-a.m).forEach(({k,m}) => {
      const rev = DATA[k]?.monthly?.revenue;
      html += `<button class="month-btn" id="mb-${k}" onclick="pick('${k}')">
        <span>${MZ[m]}</span><span class="rev-mini">${rev?fmt.money(rev):'—'}</span>
      </button>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('sidebarList').innerHTML = html;
}

function addMonth() {
  // Find the latest month to suggest next one
  const keys = Object.keys(DATA).sort();
  let suggestYear = new Date().getFullYear();
  let suggestMonth = new Date().getMonth() + 1;
  if (keys.length > 0) {
    const last = keys[keys.length - 1];
    const [ly, lm] = last.split('.').map(Number);
    if (lm === 12) { suggestYear = ly + 1; suggestMonth = 1; }
    else { suggestYear = ly; suggestMonth = lm + 1; }
  }
  const suggestKey = suggestYear + '.' + String(suggestMonth).padStart(2, '0');

  const input = prompt('請輸入要新增的月份（格式：YYYY.MM）', suggestKey);
  if (!input) return;

  const trimmed = input.trim();
  const match = trimmed.match(/^(\d{4})\.(\d{2})$/);
  if (!match) {
    alert('格式錯誤，請使用 YYYY.MM 格式，例如 2026.04');
    return;
  }
  const [, yearStr, monthStr] = match;
  const monthNum = parseInt(monthStr);
  if (monthNum < 1 || monthNum > 12) {
    alert('月份必須在 01-12 之間');
    return;
  }

  const newKey = yearStr + '.' + monthStr;
  if (DATA[newKey]) {
    alert('此月份已存在：' + newKey);
    pick(newKey);
    return;
  }

  // Create empty month structure
  DATA[newKey] = {
    daily: {},
    monthly: { revenue: 0, orders: 0, traffic: 0, selfAd: 0, line: 0, totalAd: 0, roas: 0, cpc: 0, cpa: 0 }
  };

  // Persist to localStorage so it survives refresh
  const addedMonths = loadLS(LS_ADDED_MONTHS, []);
  if (!addedMonths.includes(newKey)) {
    addedMonths.push(newKey);
    saveLS(LS_ADDED_MONTHS, addedMonths);
  }

  buildSidebar();
  pick(newKey);
  switchView('table');
}

function toggleYr(yr) {
  const el = document.getElementById('yr-'+yr);
  el.style.display = el.style.display==='none' ? '' : 'none';
}

function pick(k) {
  document.querySelectorAll('.month-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mb-'+k)?.classList.add('active');
  cur = k;
  const [y,m] = k.split('.').map(Number);
  document.getElementById('topTitle').textContent = `${y}年 ${MZ[m]}`;
  document.getElementById('topMeta').textContent = k;
  // Re-apply stored extraDaily into monthly totals
  if (extraDaily[k] && Object.keys(extraDaily[k]).length > 0) {
    recomputeMonthly(k);
  }
  // Close mobile sidebar after selection
  closeMobileSidebar();
  render();
}

function switchView(v) {
  view = v;
  document.querySelectorAll('.view-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&v==='dash')||(i===1&&v==='table')||(i===2&&v==='year')));
  render();
}

function render() {
  if (!cur) return;
  Object.values(charts).forEach(c=>c.destroy());
  charts = {};
  if (view==='dash')  renderDash();
  else if (view==='table') renderTable();
  else renderYear();
}

function renderDash() {
  const sh = DATA[cur]; if(!sh) return;
  const m  = sh.monthly||{};

  const rawBase = sh.daily||{};

  // Merge dailyOverrides into raw so new data added via NL input shows in charts
  const overrides = (dailyOverrides[cur]) || {};
  const raw = {};
  // Start with all keys from rawBase
  for (const d of Object.keys(rawBase)) {
    raw[d] = { ...(rawBase[d]||{}) };
  }
  // Merge in overrides — these cover days that might be null in rawBase
  for (const d of Object.keys(overrides)) {
    if (!raw[d]) raw[d] = {};
    Object.assign(raw[d], overrides[d]);
    const r = raw[d];
    // Also pull in extraDaily for this day (line, selfAd2, etc.)
    const ex = (extraDaily[cur]||{})[d] || {};
    // Recompute totalAd: selfAd + line + selfAd2 + sms + edm + kol
    const selfAdVal  = r.selfAd   || 0;
    const lineVal    = r.line     || ex.line    || 0;
    const selfAd2Val = ex.selfAd2 || 0;
    const smsVal     = ex.sms     || 0;
    const edmVal     = ex.edm     || 0;
    const kolVal     = ex.kol     || 0;
    if (selfAdVal > 0 || lineVal > 0) {
      r.totalAd = selfAdVal + lineVal + selfAd2Val + smsVal + edmVal + kolVal;
    }
    // Recompute roas
    if (r.revenue != null && r.totalAd > 0) {
      r.roas = r.revenue / r.totalAd;
    } else if (r.revenue != null && selfAdVal > 0) {
      r.roas = r.revenue / selfAdVal;

  }

  // Only days with real data (revenue > 0 OR orders > 0)
  // Use string keys consistently to avoid number/string mismatch
  const days = Object.keys(raw).map(Number).sort((a,b)=>a-b)
    .filter(d => (raw[String(d)]?.revenue||0)>0 || (raw[String(d)]?.orders||0)>0);

function buildTfootRow(days, raw) {
  const ex_all = extraDaily[cur] || {};
  // Pre-compute all totals
  const totRev  = days.reduce((s,d)=>s+(raw[d]?.revenue||0), 0);
  const totOrd  = days.reduce((s,d)=>s+(raw[d]?.orders||0),  0);
  const totTraf = days.reduce((s,d)=>s+(raw[d]?.traffic||0), 0);
  const totSelf = days.reduce((s,d)=>s+(raw[d]?.selfAd||0),  0);
  const totLine = days.reduce((s,d)=>s+(raw[d]?.line||0),    0);
  const totS2   = Object.values(ex_all).reduce((s,e)=>s+(e.selfAd2||0), 0);
  const totSms  = Object.values(ex_all).reduce((s,e)=>s+(e.sms||0),     0);
  const totEdm  = Object.values(ex_all).reduce((s,e)=>s+(e.edm||0),     0);
  const totKol  = Object.values(ex_all).reduce((s,e)=>s+(e.kol||0),     0);
  const totAd   = days.reduce((s,d)=>{
    const e=ex_all[d]||{};
    const baseAd=Math.max(raw[d]?.totalAd||0,(raw[d]?.selfAd||0)+(raw[d]?.line||0));
    return s+baseAd+(e.selfAd2||0)+(e.sms||0)+(e.edm||0)+(e.kol||0);
  }, 0);
  const totNet  = days.reduce((s,d)=>{const e=ex_all[d]||{};const r=raw[d]?.revenue||0,o=raw[d]?.orders||0,baseAd=Math.max(raw[d]?.totalAd||0,(raw[d]?.selfAd||0)+(raw[d]?.line||0)),ad=baseAd+(e.selfAd2||0)+(e.sms||0)+(e.edm||0)+(e.kol||0);return s+(r*0.45-ad-o*210-Math.round(r*0.015)-o*14);}, 0);
  const roas    = totAd > 0 ? totRev / totAd : 0;
  const cpa     = totOrd > 0 ? totAd / totOrd : 0;
  const conv    = totTraf > 0 ? totOrd / totTraf : 0;

  const cellMap = {
    revenue:    '<td class="green">'  + fmt.full(totRev)  + '</td>',
    orders:     '<td>'                + Math.round(totOrd) + '</td>',
    traffic:    '<td>'                + fmt.num(totTraf)  + '</td>',
    selfAd:     '<td>'                + fmt.full(totSelf) + '</td>',
    line:       '<td>'                + fmt.full(totLine) + '</td>',
    selfAd2:    '<td>'                + fmt.full(totS2)   + '</td>',
    sms:        '<td>'                + fmt.full(totSms)  + '</td>',
    edm:        '<td>'                + fmt.full(totEdm)  + '</td>',
    kol:        '<td>'                + fmt.full(totKol)  + '</td>',
    adTotal:    '<td class="yellow">' + fmt.full(totAd)   + '</td>',
    roas:       '<td class="'+(roas>=4?'pos':roas>0&&roas<2?'neg':'')+'">'+(roas>0?roas.toFixed(2):'—')+'</td>',
    cpa:        '<td>'+(cpa>0?'NT$'+Math.round(cpa):'—')+'</td>',
    cpc:        '<td>'+(totTraf>0?'NT$'+(totAd/totTraf).toFixed(1):'—')+'</td>',
    conversion: '<td>'+(conv>0?fmt.pct(conv):'—')+'</td>',
    shipping:   '<td class="red">'+fmt.full(days.reduce((s,d)=>s+Math.round((raw[d]?.orders||0)*210),0))+'</td>',
    payment:    '<td class="red">'+fmt.full(days.reduce((s,d)=>s+Math.round((raw[d]?.revenue||0)*0.015),0))+'</td>',
    box:        '<td class="red">'+fmt.full(days.reduce((s,d)=>s+Math.round((raw[d]?.orders||0)*14),0))+'</td>',
    netProfit:  '<td class="'+(totNet>=0?'pos':'neg')+'">'+fmt.full(totNet)+'</td>',
  };

  const cols = colDefs.filter(c=>c.visible).map(c=>cellMap[c.key]||'<td>—</td>').join('');
  return '<tr style="background:var(--surface2);font-weight:700;border-top:2px solid var(--border2);">'
       + '<td style="color:var(--text3);font-size:11px;letter-spacing:1px">合計</td>'
       + cols + '</tr>';
}

  DEFAULT_COLS.forEach((dc, di) => {
    if (!savedKeys.has(dc.key)) {
      const prevKey = di > 0 ? DEFAULT_COLS[di-1].key : null;

    if (dc && !c._customLabel) c.label = dc.label;
  });

function loadLS(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; }

}
function saveLS(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

// Inline cell editing
function startInlineEdit(td) {
  if (td.querySelector('input')) return; // already editing
  const attr = td.dataset.edit || td.dataset.editex;
  if (!attr) return;
  const [key, day, field] = attr.split('|');
  const isExtra = !!td.dataset.editex;
  let current = 0;
  if (isExtra) {
    current = (extraDaily[key]||{})[day]?.[field] || 0;
  } else {
    current = (DATA[key]?.daily?.[day])?.[field] || 0;
  }
  const orig = td.innerHTML;
  const inp = document.createElement('input');
  inp.type = 'number';
  inp.value = current || '';
  inp.style.cssText = 'width:90px;background:var(--surface2);border:1px solid var(--green);border-radius:4px;color:var(--text);padding:2px 6px;font-size:12px;font-family:inherit;';
  td.innerHTML = '';
  td.appendChild(inp);
  inp.focus();
  inp.select();
  
  const commit = () => {
    const val = parseFloat(inp.value) || 0;
    if (isExtra) {
      if (!extraDaily[key]) extraDaily[key] = {};
      if (!extraDaily[key][day]) extraDaily[key][day] = {};
      extraDaily[key][day][field] = val;
      saveLS(LS_EXTRA, extraDaily);
      sbSaveExtra(key, day, field, val);  // ← Supabase sync
    } else {
      // Write to DATA (for current session)
      if (!DATA[key]) DATA[key] = {};
      if (!DATA[key].daily) DATA[key].daily = {};
      if (!DATA[key].daily[day]) DATA[key].daily[day] = {};
      DATA[key].daily[day][field] = val;
      // Also persist to dailyOverrides
      if (!dailyOverrides[key]) dailyOverrides[key] = {};
      if (!dailyOverrides[key][day]) dailyOverrides[key][day] = {};
      dailyOverrides[key][day][field] = val;
      saveLS(LS_OVERRIDES, dailyOverrides);
      sbSaveOverride(key, day, field, val);  // ← Supabase sync
    }
    recomputeMonthly(key);
    render();
  };
  
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { commit(); }
    if (e.key === 'Escape') { td.innerHTML = orig; }
  });
}

// Recompute monthly totals from daily data + extraDaily
function recomputeMonthly(key) {
  if (!DATA[key] || !DATA[key].daily) return;
  const dailyRaw = DATA[key].daily;
  const extra    = (extraDaily[key] || {});
  
  let rev=0, ord=0, traf=0, selfAdSum=0, lineSum=0;
  let selfAd2Sum=0, smsSum=0, edmSum=0, kolSum=0;
  
  for (const d of Object.keys(dailyRaw)) {
    const dd = dailyRaw[d] || {};
    const ex = extra[d] || {};
    if ((dd.revenue||0) > 0 || (dd.orders||0) > 0) {
      rev       += dd.revenue || 0;
      ord       += dd.orders  || 0;
      traf      += dd.traffic || 0;
      selfAdSum += dd.selfAd  || 0;
      lineSum   += dd.line    || 0;
    }
    selfAd2Sum += ex.selfAd2 || 0;
    smsSum     += ex.sms     || 0;
    edmSum     += ex.edm     || 0;
    kolSum     += ex.kol     || 0;
  }
  
  const totalAdCalc = selfAdSum + lineSum + selfAd2Sum + smsSum + edmSum + kolSum;
  
  if (!DATA[key].monthly) DATA[key].monthly = {};
  DATA[key].monthly.revenue  = rev;
  DATA[key].monthly.orders   = ord;
  DATA[key].monthly.traffic  = traf;
  DATA[key].monthly.selfAd   = selfAdSum;
  DATA[key].monthly.line     = lineSum;
  // Store extra sums in monthly for display
  DATA[key].monthly._selfAd2 = selfAd2Sum;
  DATA[key].monthly._sms     = smsSum;
  DATA[key].monthly._edm     = edmSum;
  DATA[key].monthly._kol     = kolSum;
  DATA[key].monthly.totalAd  = totalAdCalc;
  
  // Recalc derived
  if (rev > 0 && totalAdCalc > 0) DATA[key].monthly.roas = rev / totalAdCalc;
  if (traf > 0 && totalAdCalc > 0) DATA[key].monthly.cpc = totalAdCalc / traf;
  if (ord > 0 && totalAdCalc > 0)  DATA[key].monthly.cpa = totalAdCalc / ord;
}

function fmtFull(v) {
  return v==null ? '—' : 'NT$ ' + Math.round(v).toLocaleString();
}

function setSpan(id, value, isNull) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = isNull ? '<span class="null">—</span>' : fmtFull(value);
}

function updateFinDisplays() {
  if (!cur) return;
  const sh = DATA[cur]||{};
  const m  = sh.monthly||{};
  
  const revenue  = m.revenue||0;
  const orders   = m.orders||0;
  const selfAd   = m.selfAd||0;
  const lineAd   = m.line||0;

  const selfAd2  = m._selfAd2 || 0;
  const sms      = m._sms     || 0;
  const edm      = m._edm     || 0;
  const kol      = m._kol     || 0;

  // Auto-calculated costs
  const shipping = Math.round(orders * 210);
  const payment  = Math.round(revenue * 0.015);
  const box      = Math.round(orders * 14);

  const totalAdCalc = (m.totalAd > 0 ? m.totalAd : selfAd + lineAd + selfAd2 + sms + edm + kol);
  const grossProfit = revenue * 0.45;
  const netProfit   = grossProfit - totalAdCalc - shipping - payment - box;

  setSpan('fi-selfAd2', selfAd2, selfAd2===0);
  setSpan('fi-sms',     sms,     sms===0);
  setSpan('fi-edm',     edm,     edm===0);
  setSpan('fi-kolPct',  kol,     kol===0);

  const elShip = document.getElementById('fi-shipping');
  const elPay  = document.getElementById('fi-payment');
  const elBox  = document.getElementById('fi-box');
  if(elShip) elShip.textContent = fmtFull(shipping);
  if(elPay)  elPay.textContent  = fmtFull(payment);
  if(elBox)  elBox.textContent  = fmtFull(box);

  const el1 = document.getElementById('total-ad-display');
  const el2 = document.getElementById('total-cost-display');
  const el2b = document.getElementById('total-cost-display2');
  const el3 = document.getElementById('net-profit-display');

  if(el1) el1.textContent = fmtFull(totalAdCalc);
  if(el2) el2.textContent = fmtFull(shipping+payment+box);
  if(el2b) el2b.textContent = '−'+fmtFull(shipping+payment+box);
  if(el3) {
    el3.textContent = fmtFull(netProfit);
    el3.className = 'finance-total-value ' + (netProfit>=0?'green':'red');
  }
}

let _dragSrc = null;
function colDragStart(e, i) { _dragSrc = i; e.dataTransfer.effectAllowed='move'; e.currentTarget.style.opacity='0.4'; }
function colDragEnd()       { document.querySelectorAll('.col-row').forEach(r=>{ r.style.opacity='1'; r.style.background=''; }); }
function colDragOver(e)     { e.preventDefault(); e.currentTarget.style.background='rgba(0,229,160,.08)'; return false; }
function colDrop(e, i) {
  e.preventDefault();
  if (_dragSrc === null || _dragSrc === i) return;
  const moved = colDefs.splice(_dragSrc, 1)[0];
  colDefs.splice(i, 0, moved);
  _dragSrc = null;
  renderColManager();
}

function removeCol(i) {
  if (colDefs[i].fixed) return;
  colDefs.splice(i, 1);
  renderColManager();
}

function addCustomCol() {
  const name = prompt('新欄位名稱：');
  if (!name || !name.trim()) return;
  const key = 'custom_' + Date.now();
  colDefs.push({key, label:name.trim(), visible:true, fixed:false, type:'extra'});
  renderColManager();
}

function saveColDefs() {
  // Sync label changes from inputs
  colDefs.forEach((c,i) => {
    const lbl = document.getElementById('lbl'+i);
    if (lbl) c.label = lbl.value;
    const chk = document.getElementById('chk'+i);
    if (chk && !c.fixed) c.visible = chk.checked;
  });
  saveLS(LS_COLS, colDefs);
  sbSaveColDefs(colDefs);  // ← Supabase sync
  closeColManager();
  render();
}

function renameCol(key) {
  const col = colDefs.find(c=>c.key===key);
  if (!col) return;
  const newName = prompt(`重新命名「${col.label}」：`, col.label);
  if (newName && newName.trim()) {
    col.label = newName.trim();
    saveLS(LS_COLS, colDefs);
    render();
  }
}

function applyStoredData() {
  // Restore user-added months

  addedMonths.forEach(k => {
    if (!DATA[k]) {
      DATA[k] = { daily: {}, monthly: { revenue:0, orders:0, traffic:0, selfAd:0, line:0, totalAd:0, roas:0, cpc:0, cpa:0 } };
    }
  });

  // Apply dailyOverrides into DATA
  Object.keys(dailyOverrides).forEach(k => {
    if (!DATA[k]) DATA[k] = { daily: {}, monthly: {} };
    Object.keys(dailyOverrides[k]).forEach(day => {
      if (!DATA[k].daily) DATA[k].daily = {};
      if (!DATA[k].daily[day]) DATA[k].daily[day] = {};
      Object.assign(DATA[k].daily[day], dailyOverrides[k][day]);
    });
  });
  // Recompute monthly totals
  const allKeys = new Set([...Object.keys(extraDaily), ...Object.keys(dailyOverrides)]);
  allKeys.forEach(k => { if (DATA[k]) recomputeMonthly(k); });
}

<script>
// ── NL INPUT MODULE ──

function clearNL() {

  document.getElementById('nlStatus').textContent = '';

}

const FIELD_MAP = {
  '自投帳號2': 'selfAd2',
  '自投2':     'selfAd2',
  '帳號2':     'selfAd2',
  'Line':      'lineAdNL',
  'line':      'lineAdNL',
  'LINE':      'lineAdNL',
  '簡訊':      'sms',
  'EDM':       'edm',
  'edm':       'edm',
  'KOL':       'kol',
  'kol':       'kol',
  '運費':      'shipping',
  '金流':      'payment',
  '紙箱':      'box',
};

const FIELD_LABEL = {
  selfAd2:   '自投帳號2',
  lineAdNL:  'Line 廣告',
  sms:       '簡訊',
  edm:       'EDM',
  kol:       'KOL抽成',
  shipping:  '運費預估',
  payment:   '金流預估',
  box:       '紙箱',
};

// Parse number: support 萬/千/% suffix and comma
function parseNum(str) {
  str = str.replace(/,/g,'').trim();
  if (str.includes('%')) {
    // percentage of revenue
    const pct = parseFloat(str) / 100;
    const rev = cur ? (DATA[cur]?.monthly?.revenue || 0) : 0;
    return Math.round(rev * pct);
  }
  if (str.includes('萬')) return Math.round(parseFloat(str) * 10000);
  if (str.includes('千')) return Math.round(parseFloat(str) * 1000);
  return Math.round(parseFloat(str)) || 0;
}

// Expanded field map including revenue/orders/traffic patterns
const DAILY_FIELD_MAP = {
  '營收': 'revenue', '收入': 'revenue', 'revenue': 'revenue',
  '訂單': 'orders',  '單數': 'orders',  'orders': 'orders',
  '流量': 'traffic', '訪客': 'traffic', 'traffic': 'traffic',
  '廣告費': 'selfAd', '自投': 'selfAd', '廣告': 'selfAd', 'selfAd': 'selfAd',
  'Line': 'line', 'line': 'line', 'LINE': 'line',
  '轉換率': 'conversion', '轉換': 'conversion',
  'ROAS': 'roas', 'roas': 'roas',
  'CPC': 'cpc', 'cpc': 'cpc',
  // NEW: extra daily ad cost fields → stored in extraDaily
  '自投帳號2': 'selfAd2', '帳號2': 'selfAd2', '自投2': 'selfAd2', 'selfAd2': 'selfAd2',
  '簡訊': 'sms', 'sms': 'sms', 'SMS': 'sms',
  'EDM': 'edm', 'edm': 'edm', 'Email': 'edm',
  'KOL': 'kol', 'kol': 'kol', 'KOL抽成': 'kol',
};

// Parse number: support 萬/千/% suffix and comma
function parseNum(str) {
  str = (str||'').replace(/,/g,'').trim();
  if (str.includes('%')) {
    const pct = parseFloat(str) / 100;
    const rev = cur ? (DATA[cur]?.monthly?.revenue || 0) : 0;
    return Math.round(rev * pct);
  }
  if (str.includes('萬')) return Math.round(parseFloat(str) * 10000);
  if (str.includes('千')) return Math.round(parseFloat(str) * 1000);
  return Math.round(parseFloat(str)) || 0;
}

// Detect if text contains daily data patterns like "3/17 營收 38900"
function hasDailyPattern(text) {
  return /\d{1,2}\/\d{1,2}/.test(text) || /第?\d+[日天]/.test(text);
}

// Parse daily records like "3/17 營收 38900, 訂單 12, 流量 450"
// Returns { day: number, fields: {revenue, orders, ...} }[]
function parseDailyRecords(text) {
  const records = [];
  
  // Split into segments by date markers
  // Supports: 3/17, 03/17, 3月17日, 17日, etc.
  const datePattern = /(\d{1,2}[/／]\d{1,2}|\d{1,2}月\d{1,2}[日號]?|第?\d+[日天])/g;
  
  // Split text into chunks starting with a date
  const parts = text.split(/(?=\d{1,2}[/／]\d{1,2}|\d{1,2}月\d{1,2}[日號]?)/);
  
  for (const part of parts) {
    if (!part.trim()) continue;
    
    // Extract the day number
    const dateMatch = part.match(/^(\d{1,2})[/／](\d{1,2})/);
    if (!dateMatch) continue;
    const day = parseInt(dateMatch[2]);
    if (!day || day < 1 || day > 31) continue;
    
    // Extract field values from the rest of the segment
    const rest = part.replace(/^\S+\s*/, ''); // remove date prefix
    const fields = {};
    
    // Try each field keyword
    for (const [kw, field] of Object.entries(DAILY_FIELD_MAP)) {
      const re = new RegExp(kw + '[\\s:：]*([\\d,.]+[萬千]?|[\\d.]+%)', 'i');
      const m = rest.match(re);
      if (m) fields[field] = parseNum(m[1]);
    }
    
    // Also try "keyword數字" without space: 營收38900
    for (const [kw, field] of Object.entries(DAILY_FIELD_MAP)) {
      if (fields[field]) continue; // already found
      const re = new RegExp(kw + '([\\d,.]+[萬千]?)', 'i');
      const m = part.match(re);
      if (m) fields[field] = parseNum(m[1]);
    }
    
    // If no keywords found but there are numbers, try positional parse
    // e.g. "3/17 38900 12 450" → revenue, orders, traffic
    if (Object.keys(fields).length === 0) {
      const nums = rest.match(/[\d,.]+/g);
      if (nums) {
        const positional = ['revenue', 'orders', 'traffic', 'selfAd'];
        nums.forEach((n, i) => {
          if (i < positional.length) fields[positional[i]] = parseNum(n);
        });
      }
    }
    
    if (Object.keys(fields).length > 0) {
      records.push({ day, fields });
    }
  }
  
  return records;
}

// Client-side rule-based parser (fast path)
function localParse(text) {
  // Check if this looks like daily data input
  if (hasDailyPattern(text)) {
    const records = parseDailyRecords(text);
    if (records.length > 0) {
      return { _isDailyData: true, records };
    }
  }
  
  // Otherwise parse as monthly cost fields
  const result = {};
  const parts = text.split(/[，,\n、；;]+/).map(s => s.trim()).filter(Boolean);
  
  for (const part of parts) {
    let matchedField = null;
    for (const [kw, field] of Object.entries(FIELD_MAP)) {
      if (part.toLowerCase().includes(kw.toLowerCase())) { matchedField = field; break; }
    }
    if (!matchedField) continue;
    
    const numMatch = part.match(/([\d,.]+[萬千]?|[\d.]+%)/);
    if (numMatch) {
      result[matchedField] = parseNum(numMatch[1]);
    }
  }
  return result;
}

async function parseNL() {
  const text = document.getElementById('nlInput').value.trim();
  if (!text) return;

  document.getElementById('nlResult').style.display = 'none';
  document.getElementById('nlLoading').style.display = 'flex';
  document.getElementById('nlParseBtn').disabled = true;

  // Try local parse first
  const localResult = localParse(text);
  const hasResult = Object.keys(localResult).length > 0;

  if (hasResult) {
    // Local parse succeeded — show result immediately
    document.getElementById('nlLoading').style.display = 'none';
    document.getElementById('nlParseBtn').disabled = false;
    showPreview(localResult, '本機解析');
    return;
  }

  // Fallback: call Claude API for ambiguous text
  try {
    const rev = cur ? (DATA[cur]?.monthly?.revenue || 0) : 0;
    const prompt = `你是一個費用解析助手。請從以下文字中提取費用數字，並回傳 JSON 格式。
    
費用欄位清單（只回傳有提到的）：
- selfAd2: 自投帳號2廣告費
- lineAdNL: Line廣告費  
- sms: 簡訊費
- edm: EDM費
- kol: KOL抽成
- shipping: 運費
- payment: 金流費用
- box: 紙箱費用

本月營收：NT$ ${rev.toLocaleString()}（如有百分比可用此計算）

使用者輸入：「${text}」

只回傳純 JSON，不要其他文字。例如：{"shipping":20000,"kol":5000}`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    
    const data = await response.json();
    const raw = data.content?.[0]?.text || '{}';
    // Strip markdown fences if present
    const clean = raw.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);

    document.getElementById('nlLoading').style.display = 'none';
    document.getElementById('nlParseBtn').disabled = false;
    showPreview(parsed, 'AI 解析');

  } catch(e) {
    document.getElementById('nlLoading').style.display = 'none';
    document.getElementById('nlParseBtn').disabled = false;
    document.getElementById('nlStatus').textContent = '❌ 解析失敗，請調整輸入格式';
    document.getElementById('nlResult').style.display = 'block';
    document.getElementById('nlPreviewRows').innerHTML = '';
    nlParsedData = {};
  }
}

const DAILY_FIELD_LABEL = {
  revenue: '營收', orders: '訂單數', traffic: '流量',
  selfAd: '廣告費', line: 'Line', conversion: '轉換率',
  roas: 'ROAS', cpc: 'CPC',
};

function showPreview(parsed, source) {
  nlParsedData = parsed;
  const rows = document.getElementById('nlPreviewRows');

  // ── Daily data mode ──
  if (parsed._isDailyData && parsed.records?.length > 0) {
    const recs = parsed.records;
    rows.innerHTML = `
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">
        識別到 <strong style="color:var(--cyan)">${recs.length}</strong> 筆每日資料
      </div>
      <div style="max-height:180px;overflow-y:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:11px;">
          <thead>
            <tr style="color:var(--text3)">
              <th style="text-align:left;padding:3px 6px">日期</th>
              ${Object.keys(recs[0].fields).map(f=>`<th style="text-align:right;padding:3px 6px">${DAILY_FIELD_LABEL[f]||f}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${recs.map(r=>`
              <tr style="border-top:1px solid rgba(30,45,71,.4)">
                <td style="padding:4px 6px;color:var(--cyan);font-family:monospace">${r.day}日</td>
                ${Object.values(r.fields).map(v=>`<td style="text-align:right;padding:4px 6px;font-family:monospace;color:var(--text)">${typeof v==='number'&&v>100?'NT$'+Math.round(v).toLocaleString():Math.round(v*100)/100}</td>`).join('')}
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    document.getElementById('nlStatus').textContent = `✅ ${source}完成，點確認寫入每日欄位`;
    document.getElementById('nlResult').style.display = 'block';
    return;
  }

  // ── Monthly cost mode ──
  if (Object.keys(parsed).length === 0) {
    rows.innerHTML = '<div style="color:var(--text3);font-size:12px;padding:8px 0">未識別到欄位，試試：<br>• 3/17 營收38900 訂單12<br>• 運費2萬，KOL抽成5千</div>';
    document.getElementById('nlStatus').textContent = '';
    document.getElementById('nlResult').style.display = 'block';
    return;
  }

  rows.innerHTML = Object.entries(parsed).map(([k, v]) => `
    <div class="nl-preview-row">
      <span class="nl-preview-field">${FIELD_LABEL[k] || k}</span>
      <span class="nl-preview-val">NT$ ${Math.round(v).toLocaleString()}</span>
    </div>
  `).join('');

  document.getElementById('nlStatus').textContent = `✅ ${source}完成，共識別 ${Object.keys(parsed).length} 個欄位`;
  document.getElementById('nlResult').style.display = 'block';
}

function confirmNL() {
  if (!cur) return;

  // ── Daily data mode ──
  if (nlParsedData._isDailyData && nlParsedData.records?.length > 0) {
    const records = nlParsedData.records;
    if (!extraDaily[cur]) extraDaily[cur] = {};

    const EXTRA_FIELDS = ['selfAd2','sms','edm','kol','line'];
    const CORE_FIELDS  = ['revenue','orders','traffic','selfAd'];

    let updated = 0;
    for (const rec of records) {
      const d = rec.day;
      // Split fields: extra vs core
      const extraFields = {};
      const coreFields  = {};
      for (const [field, value] of Object.entries(rec.fields)) {
        if (EXTRA_FIELDS.includes(field)) extraFields[field] = value;
        else coreFields[field] = value;
      }

      // Write extra fields to extraDaily
      if (Object.keys(extraFields).length > 0) {
        if (!extraDaily[cur][d]) extraDaily[cur][d] = {};
        Object.assign(extraDaily[cur][d], extraFields);
      }

      // Write core fields to DATA + persist in dailyOverrides
      if (Object.keys(coreFields).length > 0) {
        if (!DATA[cur]) DATA[cur] = {};
        if (!DATA[cur].daily) DATA[cur].daily = {};
        if (!DATA[cur].daily[d]) DATA[cur].daily[d] = {};
        Object.assign(DATA[cur].daily[d], coreFields);
        if (!dailyOverrides[cur]) dailyOverrides[cur] = {};
        if (!dailyOverrides[cur][d]) dailyOverrides[cur][d] = {};
        Object.assign(dailyOverrides[cur][d], coreFields);
      }
      updated++;
    }

    // Persist and recalculate
    saveLS(LS_EXTRA, extraDaily);
    saveLS(LS_OVERRIDES, dailyOverrides);

    // Sync to Supabase
    for (const rec of records) {
      const d = rec.day;
      const EXTRA_FIELDS = ['selfAd2','sms','edm','kol','line'];
      for (const [field, value] of Object.entries(rec.fields)) {
        if (EXTRA_FIELDS.includes(field)) sbSaveExtra(cur, d, field, value);
        else sbSaveOverride(cur, d, field, value);
      }
    }
    recomputeMonthly(cur);

    document.getElementById('nlStatus').textContent = `✅ 已更新 ${updated} 天的每日資料！`;
    setTimeout(() => { render(); toggleNL(); }, 800);
    return;
  }

  // ── Monthly cost mode ──
  if (Object.keys(nlParsedData).length === 0) return;

  for (const [field, value] of Object.entries(nlParsedData)) {
    if (field === 'lineAdNL') continue;
    // shipping/payment/box are now auto-calculated, skip them
    if (['shipping','payment','box'].includes(field)) continue;
    if (!finStore[cur]) finStore[cur] = {};
    finStore[cur][field] = value;
  }

  saveLS(LS_FIN, finStore);
  updateFinDisplays();
  document.getElementById('nlStatus').textContent = '✅ 已填入 ' + Object.keys(nlParsedData).filter(k=>k!=='lineAdNL').length + ' 個欄位！';

  const finSection = document.querySelector('.finance-grid');
  if (finSection) {
    finSection.style.transition = 'box-shadow .2s';
    finSection.style.boxShadow = '0 0 0 2px var(--green)';
    setTimeout(() => finSection.style.boxShadow = '', 700);
  }

  setTimeout(() => toggleNL(), 1400);
}

// Also allow Enter+Shift to submit in textarea
document.addEventListener('DOMContentLoaded', () => {
  const ta = document.getElementById('nlInput');
  if (ta) {
    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        parseNL();
      }
    });
  }
});
</script>
